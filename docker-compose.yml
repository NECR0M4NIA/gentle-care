services:
  # Le serveur Web (Nginx)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - laravel_network
    depends_on:
      - app

  # L'application PHP (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - ./:/var/www
    working_dir: /var/www
    environment:
      - DB_HOST=db
    user: "1000:1000"
    networks:
      - laravel_network
    depends_on:
      - db

  # La Base de Données (MySQL)
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network

  # Le cache et les queues (Redis)
  redis:
    image: redis:alpine
    container_name: laravel_redis
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge

volumes:
  db_data: